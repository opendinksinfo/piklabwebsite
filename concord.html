        h('path', { d: 'M 48 0 L 0 0 0 48', fill: 'none', stroke: 'rgba(196, 216, 46, 0.08)', strokeWidth: '1' })
      )
    ),
    h('rect', { width: '100%', height: '100%', fill: 'url(#pilot-grid)' })
  );

  const statRows = [
    ['Host club', 'Indoor Pickleball X'],
    ['Location', 'Concord, CA'],
    ['Courts', '9'],
    ['Players', '4,000+'],
    ['PikLab software', 'Live'],
    ['PikLab robotics', '2026'],
  ];

  const runRows = [
    ['Booking',          'Courts, leagues, drop-ins — all PikLab.'],
    ['Court ops',        'Conflicts, no-shows, day-of swaps — LLM coordinated.'],
    ['AI shot tracking', 'Six cameras per court. Live tracking → coaching reports.'],
    ['Robotics — 2026',  'Humanoid concierge, ball feeders, quadruped court managers — deploying 2026.'],
  ];

  function ConcordPilot() {
    return h('section', { style: { background: 'var(--navy)', color: 'var(--off-white)', padding: 'clamp(96px, 13vw, 180px) 0 clamp(56px, 7vw, 96px)', position: 'relative', overflow: 'hidden' } },
      gridBg,
      h('div', { className: 'container', style: { position: 'relative' } },
        h('div', { className: 'mono', style: { display: 'inline-flex', alignItems: 'center', gap: 8, color: 'var(--green)', fontSize: '0.7rem', letterSpacing: '0.18em', marginBottom: 28, padding: '6px 12px', border: '1px solid var(--green)', borderRadius: 999 } },
          h('span', { className: 'pulse-dot', style: { width: 6, height: 6, borderRadius: '50%', background: 'var(--coral)' } }),
          'PILOT LIVE · SINCE LATE 2025'
        ),
        h('h1', { className: 'h-display', style: { fontSize: 'clamp(2.6rem, 7vw, 5.6rem)', color: 'var(--off-white)', margin: 0, lineHeight: 1, maxWidth: '18ch' } },

          h('strong', null, 'Indoor Pickleball X Concord'),
          ' — 9 courts, 4,000+ players. Booking, court ops, AI: live. Robots: 2026. Indoor Pickleball X hosts, PikLab provides the tech.'

        // Stats grid
        h('div', { style: { marginTop: 48, display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 1, background: 'rgba(196, 216, 46, 0.18)', borderRadius: 14, overflow: 'hidden', border: '1px solid rgba(196, 216, 46, 0.2)', maxWidth: 880 } },

          )
        ),
        // What PikLab runs today
        h('div', { style: { marginTop: 56, maxWidth: 880 } },
          h('div', { className: 'mono', style: { color: 'var(--green)', fontSize: '0.7rem', letterSpacing: '0.18em', marginBottom: 18 } }, 'WHAT PIKLAB RUNS AT CONCORD TODAY'),
          h('ul', { style: { listStyle: 'none', padding: 0, margin: 0, display: 'grid', gap: 14 } },
            ...runRows.map(([k, v]) =>
              h('li', { key: k, style: { display: 'grid', gridTemplateColumns: '170px 1fr', gap: 20, padding: '14px 0', borderTop: '1px solid rgba(196, 216, 46, 0.12)' } },
                h('span', { className: 'mono', style: { color: 'var(--green)', fontSize: '0.74rem', letterSpacing: '0.12em' } }, k.toUpperCase()),
                h('span', { style: { color: 'rgba(250, 250, 247, 0.85)', fontSize: '0.96rem', lineHeight: 1.55 } }, v)
              )
            )
          )
        ),
        // CTAs
        h('div', { style: { display: 'flex', gap: 12, marginTop: 48, flexWrap: 'wrap' } },

          h('a', { href: 'mailto:info@piklab.ai', className: 'btn btn-ghost-light' }, 'Contact us')
        ),
        // Note
        h('div', { className: 'mono', style: { marginTop: 56, fontSize: '0.66rem', letterSpacing: '0.14em', color: 'rgba(250, 250, 247, 0.4)' } },
          'INDOOR PICKLEBALL X IS THE HOST CLUB · PIKLAB IS THE TECHNOLOGY PARTNER · QUESTIONS? INFO@PIKLAB.AI'
        )
      )
    );
  }

  function App() {
    return h(Fragment, null,
      h(Nav, { active: 'locations' }),
      h(ConcordPilot),
      h(Footer)
    );
  }

  function boot() {
    if (!window.React || !window.ReactDOM) {
      requestAnimationFrame(boot);
      return;
    }
    const mount = document.getElementById('root');
    if (!mount) return;
    ReactDOM.createRoot(mount).render(h(App));
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
</script>
