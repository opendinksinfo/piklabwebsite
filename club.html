<script type="module">
  import { Nav } from './components/Nav.js?v=15';
  import { Hero } from './components/Hero.js?v=15';
  import { Marquee } from './components/Marquee.js?v=15';
  import { Manifesto } from './components/Manifesto.js?v=15';
  import { Stats } from './components/Stats.js?v=15';
  import { AIDemo } from './components/AIDemo.js?v=15';
  import { AIRobotics } from './components/AIRobotics.js?v=15';
  import { RobotCrew } from './components/RobotCrew.js?v=15';
  import { Locations } from './components/Locations.js?v=15';
  import { Community } from './components/Community.js?v=15';
  import { Footer } from './components/Footer.js?v=15';

  const h = React.createElement;

  function App() {
    return h(React.Fragment, null,
      h(Nav, { active: 'club' }),
      h(Hero),
      h(Marquee),
      h(Manifesto),
      h(Stats),
      h(AIDemo),
      h(AIRobotics),
      h(RobotCrew),
      h(Locations, { compact: true }),
      h(Community),
      h(Footer)
    );
  }

  function boot() {
    if (!window.React || !window.ReactDOM) {
      requestAnimationFrame(boot);
      return;
    }
    const mount = document.getElementById('root');
    if (!mount) return;
    ReactDOM.createRoot(mount).render(h(App));
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
</script>
