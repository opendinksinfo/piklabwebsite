<!--
  Production load order:
  1. React UMD globals (classic, blocking — runs before any module).
  2. ReactDOM UMD global (classic, blocking).
  3. ES module entry: static imports for BrandHero/BrandTease/Footer are resolved
     before module body runs, so the App tree is fully defined at render time.
  4. Boot guard: defer createRoot until DOM is ready AND React/ReactDOM globals
     exist — eliminates the race where a module evaluates before React is on window.
-->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<script type="module">
  import { BrandHero } from './components/BrandHero.js?v=15';
  import { BrandTease } from './components/BrandTease.js?v=15';
  import { Footer } from './components/Footer.js?v=15';

  const h = React.createElement;

  function App() {
    return h(React.Fragment, null,
      h(BrandHero),
      h(BrandTease),
      h(Footer)
    );
  }

  function boot() {
    // Guard: React must be on window. With UMD scripts ordered above this
    // module (which is implicitly deferred), this should always be true.
    if (!window.React || !window.ReactDOM) {
      requestAnimationFrame(boot);
      return;
    }
    const mount = document.getElementById('root');
    if (!mount) return;
    ReactDOM.createRoot(mount).render(h(App));
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }
</script>
</body>
