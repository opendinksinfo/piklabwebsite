<!--
  Native ES module pipeline:
  1. Import map declares the bare specifier "react" and "react-dom/client"
     resolving to esm.sh production builds.
  2. modulepreload hints — URLs MUST byte-match the import strings used below.
  3. Single <script type="module"> imports everything and renders. Module
     specifier resolution is top-down and deterministic, so no boot guard,
     no rAF polling, no DOM-ready check needed — module scripts are deferred
     by spec and run after the document is parsed.
-->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
  }
}
</script>

<script type="module">
  import React from 'react';
  import { createRoot } from 'react-dom/client';

  // Transition shim: Footer.js (shared across all pages) reads React from
  // the global. Static `import` is hoisted — it would evaluate before this
  // assignment — so component modules are dynamic-imported below, after
  // window.React is set. Remove once every component has its own React import.
  window.React = React;

  const [{ BrandHero }, { BrandTease }, { Footer }] = await Promise.all([
    import('./components/BrandHero.js?v=16'),
    import('./components/BrandTease.js?v=16'),
    import('./components/Footer.js?v=15'),
  ]);

  const h = React.createElement;

  const App = () => h(React.Fragment, null,
    h(BrandHero),
    h(BrandTease),
    h(Footer)
  );

  createRoot(document.getElementById('root')).render(h(App));
</script>
