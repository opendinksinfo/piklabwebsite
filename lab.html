  <h1>The PikLab Lab — Robotics &amp; AI for Physical Spaces</h1>
  <p>We build the robot fleet that runs the floor — humanoids (Atlas), quadrupeds (Birdie), ball feeders (M-7), sweepers (Sweep) — and the LLM orchestrator that coordinates them. Pickleball is the testbed; the systems are designed to generalize to any physical space.</p>
  <p>Field notes from the team that builds the robots and the AI that runs our clubs:</p>
  <ul>
    <li>Why Birdie can't do stairs (yet) — Mei Park · Robotics</li>
    <li>"Book me a court near the window at 6" — Dani Calderón · AI</li>
    <li>M-7's third wheel: the case for asymmetric spin — Kai Wei · Mechanical</li>
    <li>What court 04 looked like last Saturday — Operations · Fresno</li>
    <li>The kitchen line is a sensor problem — Anil Singh · Coaching research</li>
    <li>Why Atlas waits two beats before saying hello — Dani Calderón · AI</li>
  </ul>
  <p>Spinout: <a href="https://opendinks.com">OpenDinks</a> — the software running our clubs, now sold to others.</p>
  <p>Hiring: robotics engineer, mechanical engineer, AI engineer, full-stack engineer (Fresno or remote).</p>
  <p>Contact: <a href="mailto:info@piklab.ai">info@piklab.ai</a></p>
</noscript>
